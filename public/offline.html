<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sipurai - אופליין</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #ddd6fe 100%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #1e1b4b;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #7c3aed;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #4c1d95;
      margin-bottom: 2rem;
    }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #6d28d9; }
    button:active { background: #5b21b6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📖</div>
    <h1>אופס, אין חיבור לאינטרנט</h1>
    <p>
      נראה שאין חיבור לרשת כרגע.
      בדקו את החיבור ונסו שוב.
    </p>
    <button onclick="window.location.reload()">נסו שוב</button>
  </div>
</body>
</html>
