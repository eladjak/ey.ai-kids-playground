<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Open book shape -->
  <g transform="translate(256,240)">
    <!-- Left page -->
    <path d="M-20,60 L-20,-80 Q-20,-100 -40,-100 L-140,-100 Q-160,-100 -160,-80 L-160,60 Q-160,80 -140,80 L-40,80 Q-20,80 -20,60 Z" fill="white" opacity="0.95"/>
    <!-- Right page -->
    <path d="M20,60 L20,-80 Q20,-100 40,-100 L140,-100 Q160,-100 160,-80 L160,60 Q160,80 140,80 L40,80 Q20,80 20,60 Z" fill="white" opacity="0.85"/>
    <!-- Book spine shadow -->
    <rect x="-4" y="-100" width="8" height="180" rx="4" fill="white" opacity="0.5"/>
    <!-- Sparkle stars -->
    <circle cx="-80" cy="-40" r="6" fill="#FBBF24"/>
    <circle cx="100" cy="-60" r="5" fill="#FBBF24"/>
    <circle cx="60" cy="-20" r="4" fill="#FBBF24"/>
    <!-- Text lines on left page -->
    <rect x="-140" y="-60" width="80" height="6" rx="3" fill="#7C3AED" opacity="0.3"/>
    <rect x="-140" y="-44" width="100" height="6" rx="3" fill="#7C3AED" opacity="0.2"/>
    <rect x="-140" y="-28" width="60" height="6" rx="3" fill="#7C3AED" opacity="0.15"/>
    <!-- Text lines on right page -->
    <rect x="40" y="-60" width="80" height="6" rx="3" fill="#4F46E5" opacity="0.3"/>
    <rect x="40" y="-44" width="100" height="6" rx="3" fill="#4F46E5" opacity="0.2"/>
    <rect x="40" y="-28" width="70" height="6" rx="3" fill="#4F46E5" opacity="0.15"/>
  </g>
  <!-- "S" letter at bottom -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="80" fill="white" opacity="0.9">S</text>
</svg>
