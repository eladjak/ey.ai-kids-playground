name: E2E Tests
on:
  pull_request:
    branches: [main]

# E2E tests only run on PRs, not on every push to main.
# The app requires Clerk authentication which is not available in CI,
# so most E2E tests fail in CI without auth tokens.

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build app (verify it compiles)
        run: npx vite build

      - name: Run E2E tests
        run: npx playwright test
        continue-on-error: true
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
